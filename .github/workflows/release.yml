name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - platform: ubuntu-22.04
            args: ''
          # Windows x86_64
          - platform: windows-latest
            args: ''
          # Windows ARM64
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
          # macOS ARM (Apple Silicon)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # macOS x86_64 (Intel)
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DENOS ${{ github.ref_name }}'
          releaseBody: 'See the assets below for all available downloads.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

  # ── Linux ARM64 (cross-compiled) ──
  linux-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config

          # Install aarch64 libraries
          sudo dpkg --add-architecture arm64
          # Add arm64 sources
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            libssl-dev:arm64 \
            libgtk-3-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 \
            libglib2.0-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsecret-1-dev:arm64 \
            librsvg2-dev:arm64 \
            patchelf || echo "Some arm64 libs may have failed, continuing..."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build for ARM64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          npm run build
          cargo build --release --target aarch64-unknown-linux-gnu --manifest-path src-tauri/Cargo.toml

      - name: Collect ARM64 artifacts
        run: |
          mkdir -p artifacts
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/denos artifacts/DENOS_aarch64_linux || true
          chmod +x artifacts/DENOS_aarch64_linux || true
          ls -la artifacts/

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: denos-linux-arm64
          path: artifacts/*

  # ── Arch Linux (PKGBUILD) ──
  arch-linux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel git \
            rust cargo \
            nodejs npm \
            webkit2gtk-4.1 gtk3 libsoup3 openssl glib2 dbus libsecret \
            patchelf librsvg libappindicator-gtk3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "PKGVER=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder .
          cd packaging/arch
          su builder -c "PKGVER=${{ env.PKGVER }} makepkg -s --noconfirm --skipchecksums 2>&1" || {
            echo "makepkg failed"
            exit 1
          }

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: denos-arch-linux
          path: packaging/arch/*.pkg.tar.zst

  # ── Flatpak ──
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Flatpak manifest tag
        run: |
          TAG_NAME=${GITHUB_REF_NAME}
          sed -i "s/tag: v.*/tag: ${TAG_NAME}/" packaging/flatpak/dnnid.denos.signer.yml

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: packaging/flatpak/dnnid.denos.signer.yml
          bundle: DENOS.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: denos-flatpak
          path: DENOS.flatpak

  # ── Upload extra artifacts to release ──
  upload-extras:
    needs: [release, arch-linux, linux-arm64, flatpak]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Arch artifact
        uses: actions/download-artifact@v4
        with:
          name: denos-arch-linux
          path: extras
        continue-on-error: true

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: denos-linux-arm64
          path: extras
        continue-on-error: true

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: denos-flatpak
          path: extras
        continue-on-error: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extras/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
