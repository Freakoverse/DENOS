name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - platform: ubuntu-22.04
            args: ''
          # Windows x86_64
          - platform: windows-latest
            args: ''
          # Windows ARM64
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
          # macOS ARM (Apple Silicon)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # macOS x86_64 (Intel)
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libglib2.0-dev \
            libdbus-1-dev \
            libsecret-1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DENOS ${{ github.ref_name }}'
          releaseBody: 'See the assets below for all available downloads.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      # Upload the raw Linux binary for repackaging jobs
      - name: Upload Linux binary for repackaging
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: denos-linux-binary
          path: src-tauri/target/release/denos

  # ── Linux ARM64 (cross-compiled) ──
  linux-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            pkg-config

          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev:arm64 \
            libssl-dev:arm64 \
            libgtk-3-dev:arm64 \
            libsoup-3.0-dev:arm64 \
            libjavascriptcoregtk-4.1-dev:arm64 \
            libglib2.0-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsecret-1-dev:arm64 \
            librsvg2-dev:arm64 \
            patchelf || echo "Some arm64 libs may have failed, continuing..."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build for ARM64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          npm run build
          cargo build --release --target aarch64-unknown-linux-gnu --manifest-path src-tauri/Cargo.toml

      - name: Collect ARM64 artifacts
        run: |
          mkdir -p artifacts
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/denos artifacts/DENOS_aarch64_linux || true
          chmod +x artifacts/DENOS_aarch64_linux || true
          ls -la artifacts/

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: denos-linux-arm64
          path: artifacts/*

  # ── Arch Linux (packages pre-built binary) ──
  arch-linux:
    needs: release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install base tools
        run: pacman -Syu --noconfirm base-devel

      - name: Checkout (for icons and desktop file)
        uses: actions/checkout@v4

      - name: Download pre-built binary
        uses: actions/download-artifact@v4
        with:
          name: denos-linux-binary
          path: binary

      - name: Set version from tag
        run: echo "PKGVER=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create packaging PKGBUILD
        run: |
          mkdir -p pkg-build
          cat > pkg-build/PKGBUILD << 'PKGEOF'
          # Maintainer: Freakoverse
          pkgname=denos
          pkgver=${PKGVER}
          pkgrel=1
          pkgdesc="Nostr Signer, Payment System, and ID Manager"
          arch=('x86_64')
          url="https://github.com/Freakoverse/DENOS"
          license=('MIT')
          depends=('webkit2gtk-4.1' 'gtk3' 'libsoup3' 'openssl' 'glib2' 'dbus' 'libsecret' 'gst-plugins-good' 'gst-plugins-bad' 'gst-libav')

          package() {
              install -Dm755 "${startdir}/../binary/denos" "${pkgdir}/usr/bin/denos"

              for size in 32 48 128 256 512; do
                  if [ -f "${startdir}/../src-tauri/icons/${size}x${size}.png" ]; then
                      install -Dm644 "${startdir}/../src-tauri/icons/${size}x${size}.png" \
                          "${pkgdir}/usr/share/icons/hicolor/${size}x${size}/apps/dnnid.denos.signer.png"
                  fi
              done

              if [ -f "${startdir}/../packaging/flatpak/dnnid.denos.signer.desktop" ]; then
                  install -Dm644 "${startdir}/../packaging/flatpak/dnnid.denos.signer.desktop" \
                      "${pkgdir}/usr/share/applications/dnnid.denos.signer.desktop"
              fi

              if [ -f "${startdir}/../src-tauri/dnnid.denos.signer.metainfo.xml" ]; then
                  install -Dm644 "${startdir}/../src-tauri/dnnid.denos.signer.metainfo.xml" \
                      "${pkgdir}/usr/share/metainfo/dnnid.denos.signer.metainfo.xml"
              fi
          }
          PKGEOF
          # Replace ${PKGVER} with actual version
          sed -i "s/\${PKGVER}/${{ env.PKGVER }}/" pkg-build/PKGBUILD

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder .
          cd pkg-build
          su builder -c "makepkg -d --noconfirm --skipchecksums 2>&1"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: denos-arch-linux
          path: pkg-build/*.pkg.tar.zst

  # ── Flatpak (packages pre-built binary) ──
  flatpak:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for icons and desktop file)
        uses: actions/checkout@v4

      - name: Download pre-built binary
        uses: actions/download-artifact@v4
        with:
          name: denos-linux-binary
          path: binary

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Create Flatpak manifest for binary
        run: |
          chmod +x binary/denos
          cat > flatpak-manifest.yml << 'EOF'
          app-id: dnnid.denos.signer
          runtime: org.freedesktop.Platform
          runtime-version: '24.08'
          sdk: org.freedesktop.Sdk
          command: denos
          finish-args:
            - --share=network
            - --socket=wayland
            - --socket=x11
            - --share=ipc
            - --talk-name=org.freedesktop.secrets
            - --talk-name=org.kde.StatusNotifierWatcher
            - --talk-name=org.freedesktop.Notifications
            - --device=dri
          modules:
            - name: denos
              buildsystem: simple
              build-commands:
                - install -Dm755 denos /app/bin/denos
                - install -Dm644 dnnid.denos.signer.desktop /app/share/applications/dnnid.denos.signer.desktop
                - install -Dm644 128x128.png /app/share/icons/hicolor/128x128/apps/dnnid.denos.signer.png
                - install -Dm644 256x256.png /app/share/icons/hicolor/256x256/apps/dnnid.denos.signer.png
                - install -Dm644 512x512.png /app/share/icons/hicolor/512x512/apps/dnnid.denos.signer.png
              sources:
                - type: file
                  path: binary/denos
                - type: file
                  path: packaging/flatpak/dnnid.denos.signer.desktop
                - type: file
                  path: src-tauri/icons/128x128.png
                - type: file
                  path: src-tauri/icons/256x256.png
                - type: file
                  path: src-tauri/icons/512x512.png
          EOF

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir flatpak-manifest.yml
          flatpak build-bundle repo DENOS.flatpak dnnid.denos.signer

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: denos-flatpak
          path: DENOS.flatpak

  # ── Upload extra artifacts to release ──
  upload-extras:
    needs: [release, arch-linux, linux-arm64, flatpak]
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Arch artifact
        uses: actions/download-artifact@v4
        with:
          name: denos-arch-linux
          path: extras
        continue-on-error: true

      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: denos-linux-arm64
          path: extras
        continue-on-error: true

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: denos-flatpak
          path: extras
        continue-on-error: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: extras/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
