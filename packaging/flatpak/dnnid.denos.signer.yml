app-id: dnnid.denos.signer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: denos

finish-args:
  # Network access (relay connections)
  - --share=network
  # Wayland
  - --socket=wayland
  # X11 fallback
  - --socket=x11
  - --share=ipc
  # D-Bus for Secret Service (keyring) and tray icon
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  # GPU rendering
  - --device=dri

modules:
  - name: denos
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
      env:
        CARGO_HOME: /run/build/denos/cargo
        npm_config_nodedir: /usr/lib/sdk/node22
    build-commands:
      - npm ci --offline || npm ci
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/denos /app/bin/denos
      - install -Dm644 packaging/flatpak/dnnid.denos.signer.desktop /app/share/applications/dnnid.denos.signer.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/dnnid.denos.signer.png
      - install -Dm644 src-tauri/icons/256x256.png /app/share/icons/hicolor/256x256/apps/dnnid.denos.signer.png
      - install -Dm644 src-tauri/icons/512x512.png /app/share/icons/hicolor/512x512/apps/dnnid.denos.signer.png
    sources:
      - type: dir
        path: ../..
